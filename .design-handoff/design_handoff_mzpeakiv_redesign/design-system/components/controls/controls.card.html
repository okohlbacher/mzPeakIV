<!-- @dsCard group="Components" viewport="700x300" name="Controls" subtitle="Buttons, icon buttons & segmented controls" -->
<!doctype html>
<html>
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../../styles.css" />
<style>
  body { margin: 0; padding: 22px 24px; background: var(--bg-app); }
  .grp { display: flex; flex-direction: column; gap: 14px; }
  .row { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
  .cap { font-size: var(--text-2xs); font-weight: 600; letter-spacing: var(--tracking-caps);
         text-transform: uppercase; color: var(--text-faint); width: 100%; margin-bottom: -4px; }
</style>
</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js" onerror="window.__dsBundleMissing=true"></script>
<script src="../../ds-runtime-fallback.js"></script>
<script type="text/babel">
  const { Button, SegmentedControl } = window.MzPeakDesignSystem_019e25;
  const Ico = (d) => (
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">{d}</svg>
  );
  const play = Ico(<polygon points="6 3 20 12 6 21 6 3" />);
  const down = Ico(<><path d="M12 3v12" /><path d="m7 12 5 5 5-5" /><path d="M5 21h14" /></>);
  function Demo() {
    const [view, setView] = React.useState("ion");
    return (
      <div className="grp">
        <div className="row"><span className="cap">Buttons</span>
          <Button variant="primary" iconLeft={play}>Show Ion Image</Button>
          <Button variant="secondary">Render</Button>
          <Button variant="secondary" size="sm" iconLeft={down}>TIFF</Button>
          <Button variant="ghost" size="sm">Reset</Button>
          <Button variant="danger" size="sm">Clear ROI</Button>
          <Button variant="primary" disabled>Computing…</Button>
        </div>
        <div className="row"><span className="cap">Segmented · view switch</span>
          <SegmentedControl value={view} onChange={setView} ariaLabel="View"
            options={[{value:"overview",label:"Overview"},{value:"ion",label:"Ion Image"},{value:"multi",label:"Multi-channel"}]} />
        </div>
        <div className="row"><span className="cap">Segmented · small</span>
          <SegmentedControl size="sm" value="viridis" onChange={()=>{}} ariaLabel="Colormap"
            options={[{value:"viridis",label:"viridis"},{value:"inferno",label:"inferno"},{value:"gray",label:"gray"}]} />
          <SegmentedControl size="sm" value="linear" onChange={()=>{}} ariaLabel="Scale"
            options={[{value:"linear",label:"linear"},{value:"log",label:"log"}]} />
        </div>
      </div>
    );
  }
  ReactDOM.createRoot(document.getElementById("root")).render(<Demo />);
</script>
</body>
</html>
