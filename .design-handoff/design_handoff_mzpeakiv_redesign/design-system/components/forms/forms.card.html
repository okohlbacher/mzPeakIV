<!-- @dsCard group="Components" viewport="700x230" name="Forms" subtitle="Numeric fields, selects & checkboxes" -->
<!doctype html>
<html>
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../../styles.css" />
<style>
  body { margin: 0; padding: 22px 24px; background: var(--bg-app); }
  .grp { display: flex; flex-direction: column; gap: 16px; }
  .row { display: flex; gap: 10px; align-items: flex-end; flex-wrap: wrap; }
  .dash { align-self: center; color: var(--text-faint); padding-bottom: 6px; }
  .cap { font-size: var(--text-2xs); font-weight: 600; letter-spacing: var(--tracking-caps);
         text-transform: uppercase; color: var(--text-faint); width: 100%; margin-bottom: -6px; }
</style>
</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js" onerror="window.__dsBundleMissing=true"></script>
<script src="../../ds-runtime-fallback.js"></script>
<script type="text/babel">
  const { NumberField, Select, Checkbox } = window.MzPeakDesignSystem_019e25;
  function Demo() {
    const [a, setA] = React.useState("740.50");
    const [b, setB] = React.useState("742.50");
    const [pct, setPct] = React.useState("0.99");
    const [norm, setNorm] = React.useState(true);
    return (
      <div className="grp">
        <div>
          <div className="cap">m/z range</div>
          <div className="row">
            <NumberField value={a} onChange={setA} unit="Da" width="108px" ariaLabel="m/z start" />
            <span className="dash">–</span>
            <NumberField value={b} onChange={setB} unit="Da" width="108px" ariaLabel="m/z end" />
            <NumberField value="0.5" onChange={()=>{}} unit="µm" width="92px" ariaLabel="sigma" size="sm" />
          </div>
        </div>
        <div className="row">
          <Select value={pct} onChange={setPct} ariaLabel="Percentile"
            options={[{value:"0.9",label:"90th pct"},{value:"0.95",label:"95th pct"},{value:"0.99",label:"99th pct"},{value:"0.999",label:"99.9th pct"}]} />
          <Select value="equalize" onChange={()=>{}} ariaLabel="Contrast" size="sm"
            options={[{value:"none",label:"None"},{value:"equalize",label:"Equalize"},{value:"clahe",label:"CLAHE"}]} />
          <Checkbox checked={norm} onChange={setNorm} label="TIC norm" />
        </div>
      </div>
    );
  }
  ReactDOM.createRoot(document.getElementById("root")).render(<Demo />);
</script>
</body>
</html>
